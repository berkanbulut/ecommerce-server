services:
  mysql:
    image: mysql:8.0
    container_name: security_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: spring_security_db
    ports:
      - "3306:3306"
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - mysql_data:/var/lib/mysql

  mailhog:
    image: mailhog/mailhog
    container_name: security_mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  mysql_data: